<!DOCTYPE html>
<html>
<head>
<style>
h1 {
  background-color: #FABBE7;
  color:#ED12AB;
}

div {
  background-color: #FDE7F7;
  font-size:30px;
   color:#ED12AB
}

  background-color: #F792D9;
  color:#F03DBA

</head>

<div>

</div>

</body>
</html>
